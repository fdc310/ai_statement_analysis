version: '3.8'

services:
  api:
    build: .
    container_name: ai_statement_analysis
    ports:
      - "8000:8000"
    environment:
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
      - TENCENT_APPID=${TENCENT_APPID}
      - AES_KEY=${AES_KEY}
      - AES_IV=${AES_IV}
      - REQUEST_EXPIRE_SECONDS=${REQUEST_EXPIRE_SECONDS}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - DEBUG=${DEBUG}
      - HUNYUAN_MODEL=${HUNYUAN_MODEL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_PREFIX=${S3_PREFIX}
      - S3_SECURE=${S3_SECURE}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
